services:
  - type: web
    name: binancebot
    runtime: node
    plan: free
    buildCommand: npm ci && npm run render:build
    startCommand: npm run start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=2048
      - key: BETTER_AUTH_URL
        value: https://binancebot.onrender.com
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_DB_PATH
        value: /tmp/auth.sqlite
      - key: LOCAL_BOT_STORE_PATH
        value: /tmp/local-bot-store.json
      - key: LOCAL_BINANCE_CREDS_PATH
        value: /tmp/binance-creds.json
      - key: BINANCE_TESTNET
        value: "true"
